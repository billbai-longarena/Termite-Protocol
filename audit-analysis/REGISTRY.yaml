- date: 2026-03-02
  type: finding-open
  id: W-010
  status: deferred
  title: "Signal lifecycle lacks intermediate states between open and completed"
  source: "A-005 touchcli signal lifecycle analysis"
  severity: low
  description: >
    S-003 completed only planning+scaffolding (610+1346 lines) but was marked
    completed because the agent finished what it could. No "partially done" or
    "planning done, implementation pending" state exists. Agents must choose
    between completed (losing visibility) or open (causing re-claim). The
    `next` field partially addresses this but is not consistently used.
  deferred_rationale: >
    Adding new signal states increases protocol concept surface area (conflicts
    with F-009). Better approach: strengthen `next` field convention — if next
    is non-empty on a completed signal, it means "remaining work exists".
    This requires no protocol change, only documentation.

