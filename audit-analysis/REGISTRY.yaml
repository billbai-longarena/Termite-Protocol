# Termite Protocol — Audit Registry
# Append-only. Each entry records one audit event or protocol evolution milestone.
# Nurse reads this file first to understand what needs attention.
#
# Entry types:
#   audit-received   — a host project submitted an audit package
#   template-fix     — a bug was fixed in protocol templates
#   protocol-evolution — a non-fix change to the protocol (spec, terminology, design)
#   finding-open     — an unresolved issue identified from audit or observation
#
# Status: open | fixed | wontfix | deferred

