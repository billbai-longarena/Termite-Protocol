# ── Open Findings (from OAE audit, not yet resolved) ─────────────────

- date: 2026-03-01
  type: finding-open
  id: F-002
  status: fixed
  title: "install.sh does not auto-install git hooks"
  source: "OAE audit Finding 2"
  severity: high
  description: >
    install.sh copies hooks to scripts/hooks/ but does not run
    scripts/hooks/install.sh to place them in .git/hooks/.
    Result: 94.4% of OAE commits had no termite signature.
  fixed_by: "install.sh lines 299-330 already contain inline hook installation logic"
  fixed_date: 2026-03-01
  notes: >
    Nurse review found that install.sh already has a dedicated
    'Install Git Hooks' section that copies hooks to .git/hooks/
    and sets permissions. The finding was recorded after the OAE
    audit but the fix predates the finding registration. OAE's
    low signature ratio was due to running an older install.sh
    version. New installations are not affected.

- date: 2026-03-01
  type: finding-open
  id: F-003
  status: fixed
  title: "field-submit-audit.sh not in standard install flow"
  source: "OAE audit Finding 3"
  severity: medium
  description: >
    The cross-colony feedback loop's outbound path is not installed
    by default. Host projects cannot participate without manual setup.
  fixed_by: "Integrated field-submit-audit.sh call into field-cycle.sh metabolism loop"
  fixed_date: 2026-03-01
  notes: >
    field-submit-audit.sh was already copied by install.sh (in PROTOCOL_SCRIPTS)
    and .termite-telemetry.yaml was already installed (in ENTRY_FILES). The missing
    piece was automatic invocation. Now field-cycle.sh calls field-submit-audit.sh
    at the end of each metabolism cycle. The script's own gates (telemetry check,
    disclaimer, frequency) ensure it only submits when configured and due.

- date: 2026-03-01
  type: finding-open
  id: F-004
  status: fixed
  title: ".gitignore blocks audit-packages/ in protocol source repo"
  source: "OAE audit Finding 5"
  severity: medium
  description: >
    Requires git add -f when committing audit packages to protocol
    source repo.
  fixed_by: "Removed audit-packages/ from protocol source repo .gitignore"
  fixed_date: 2026-03-01

- date: 2026-03-01
  type: finding-open
  id: F-005
  status: fixed
  title: "field-export-audit.sh does not match BLACKBOARD section headers"
  source: "OAE audit Finding 6"
  severity: low
  description: >
    Regex patterns for immune log and health sections only match
    exact Chinese/English headers. Host projects with different
    headers get empty sections in audit packages.
  fixed_by: "Replaced exact header matching with keyword-based awk patterns"
  fixed_date: 2026-03-01
  notes: >
    Now matches any ## heading containing 免疫/[Ii]mmune for immune log
    and 健康/[Hh]ealth for health section. Covers bilingual headers,
    variant phrasings, and mixed-language section titles.

- date: 2026-03-01
  type: finding-open
  id: F-006
  status: fixed
  title: "field-submit-audit.sh fails on same-owner repos"
  source: "OAE audit Finding 4"
  severity: low
  description: >
    Script assumes fork-based workflow. When host project owner =
    protocol source repo owner, gh repo fork is a no-op and PR fails.
  fixed_by: "Added same-owner detection; skips fork and pushes branch directly"
  fixed_date: 2026-03-01
  notes: >
    Compares GH_USER with upstream owner. When equal, clones upstream
    directly, branches from origin/main, pushes without fork, and uses
    simple branch name for PR --head parameter.

- date: 2026-03-01
  type: finding-open
  id: F-007
  status: fixed
  title: "field-export-audit.sh cp -R creates nested signals/signals/ directory"
  source: "0227/signals/observations/O-003.yaml (ReactArmor audit)"
  severity: medium
  description: >
    cp -R "$SIGNALS_DIR" "${OUT_DIR}/signals" can create
    signals/signals/ nesting when the target directory already exists.
    Audit package size doubles due to duplicate signal tree.
    Cross-colony signal: ReactArmor (O-003) + independent path analysis.
  affected_scripts:
    - field-export-audit.sh
  fixed_by: "Added rm -rf before cp -R to ensure clean target directory"
  fixed_date: 2026-03-01

