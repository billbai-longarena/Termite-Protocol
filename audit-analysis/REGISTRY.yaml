# ── 2026-03-03 session 2: PE-005 Strength-Based Participation ────────

- date: 2026-03-03
  type: protocol-evolution
  id: PE-005
  status: fixed
  title: "Strength-Based Participation — differentiated .birth by participant strength"
  description: >
    Protocol evolves from "uniform .birth → uniform behavior" to "identify strengths →
    differentiated .birth → each plays to their strengths". Six cross-colony audits
    (4 host projects) revealed the protocol's fundamental design flaw: treating all
    participants as homogeneous "blind termites" when actual capabilities vary widely.
    Core value: let every participant do what they're best at and form collective advantage.
  design: docs/plans/2026-03-03-strength-based-participation-design.md
  closes: ["W-012"]
  partially_addresses: ["W-013", "F-009b", "F-009c"]
  files_changed:
    - templates/scripts/termite-db-schema.sql
    - templates/scripts/termite-db.sh
    - templates/scripts/field-lib.sh
    - templates/scripts/field-deposit.sh
    - templates/scripts/field-arrive.sh
    - templates/scripts/field-cycle.sh
    - templates/TERMITE_PROTOCOL.md
    - templates/UPGRADE_NOTES.md
    - templates/CLAUDE.md
    - templates/AGENTS.md
  notes: >
    Five phases implemented:
    (1) Infrastructure: DB schema v2→v3 (agents+pheromone_history gain platform/strength
    columns), enhanced platform detection (OpenCode), pheromone metadata extension
    (2) Strength profiles: compute_strength_tier() inference algorithm (platform + 24h
    behavioral data), trigger type detection (heartbeat/directive), agent registration
    (3) Differentiated .birth: three template functions (execution ~500tok, judgment ~650tok,
    direction ~500tok), static content migration (birth-static-included marker frees ~200tok),
    observation deposit differentiation (execution=optional, direction=auto-high)
    (4) Rule quality gate (W-012a): validate_rule_quality() rejects degenerate triggers,
    tautological actions, short actions; source observations still archived
    (5) Protocol docs: v3.5→v4.0, kernel v10→v11, field lib v21→v22
