- date: 2026-03-03
  type: finding-open
  id: W-015
  status: open
  title: "Claim lock starvation — 63-minute idle tail from orphaned claims"
  source: "A-006 touchcli multi-model audit"
  severity: medium
  description: >
    From 23:15 to 00:18 UTC, 28 consecutive pheromone entries are pure idle heartbeats.
    Agents wait for S-094/S-108 claims to expire rather than preempting. The claiming
    agents have ended their sessions but claims remain locked. Different from W-007
    (colony-level idle): here work exists but is locked behind orphaned claims.
  root_cause: >
    Claim TTL governance is passive (wait for expiry). With 5 agents, orphaned claims
    become a bottleneck because multiple agents compete for zero open signals.
  recommendation: >
    W-015a: Add claim timeout enforcement in field-cycle.sh or field-claim.sh:
    if a claimed signal's last_touched timestamp is >N heartbeats old (suggest 10),
    auto-release the claim. More aggressive than TTL but prevents multi-agent starvation.

