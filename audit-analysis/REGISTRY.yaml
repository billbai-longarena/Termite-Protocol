- date: 2026-03-02
  type: finding-open
  id: W-007
  status: fixed
  title: "Idle heartbeat spinning wastes compute when all signals completed"
  source: "A-005 touchcli audit"
  severity: high
  description: >
    50 of 77 pheromone entries (65%) are pure idle "zero actionable queue" heartbeats.
    From ~20:20 to 23:11 UTC, 3 agents cycled continuously with nothing to do,
    depositing empty pheromone every 1-3 minutes. Causes: compute waste (~9 agent-hours),
    pheromone chain pollution, inflated predecessor_useful ratio.
  root_cause: >
    field-cycle.sh has no exit condition for "no actionable signals remaining".
    The sense→act→deposit loop runs unconditionally regardless of signal state.
  recommendation: >
    R-005: Add idle detection to field-cycle.sh. After N consecutive cycles with
    zero actionable signals, either (a) exponential backoff on sleep, or (b) exit
    with HOLE signal "colony idle — new work needed". Suggested: 3 idle → 2x sleep,
    10 idle → exit. Also suppress empty pheromone deposits during idle.
  fixed_by: TF-005
  fixed_date: 2026-03-02
  fix_notes: >
    Partial fix: added idle colony detection in field-arrive.sh .birth situation
    ("IDLE: Colony has no actionable signals. Either deposit a HOLE signal for new
    work, or exit session.") and recovery_hints (idle_colony). Agents now receive
    explicit guidance to exit or deposit HOLE when idle. Full cycle-level backoff
    (R-005) deferred — .birth guidance addresses the root information gap.

