  source: "A-005 touchcli signal lifecycle analysis (S-006 closed despite missing pydantic_settings/psycopg2)"
  severity: low
  description: >
    S-006 was marked completed when only static compile passed; runtime
    dependencies (pydantic_settings, psycopg2) were missing. Protocol does
