- date: 2026-03-01
  type: finding-open
  id: F-008
  status: fixed
  title: "Upgrade information flow has three broken links — no changelog, no semantic summary, no action guidance"
  source: "Nurse self-check session 3 — tracing upgrade chain from protocol source repo to host project agent"
  severity: high
  description: >
    Three gaps in the upgrade information flow prevent host project agents
    from making informed upgrade decisions and taking post-upgrade actions:
    (1) HOLE signal and protocol spec reference "review changelog" but no
    CHANGELOG or UPGRADE_NOTES exists anywhere in the repo;
    (2) install.sh --upgrade prints only file counts, no semantic diff or
    "what changed" summary;
    (3) After upgrade, no mechanism tells the colony whether action is needed
    (e.g. configure .termite-telemetry.yaml for new auto-submit feature)
    or whether the upgrade is purely transparent.
  affected_files:
    - templates/scripts/field-arrive.sh (HOLE signal next field)
    - install.sh (upgrade summary output)
    - templates/TERMITE_PROTOCOL.md (references "review changelog")
    - templates/CLAUDE.md (lookup index)
    - templates/AGENTS.md (lookup index, Codex agents)
  plan: docs/plans/2026-03-01-upgrade-info-flow-design.md
  fixed_by: TF-004
  fixed_date: 2026-03-01

