    assembly — when active_signals=0, wip≠fresh, alarm=false, genesis=false,
    injects "IDLE: Colony has no actionable signals" guidance. Added idle_colony
    recovery hint in .birth. Cross-colony signal: touchcli A-005 → protocol fix.
