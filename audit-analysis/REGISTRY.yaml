  id: F-001
  status: fixed
  title: "grep -c returns exit code 1 under set -euo pipefail"
  source: "0227/signals/observations/O-001.yaml"
  description: >
    grep -c outputs "0" AND returns exit 1 on zero matches.
    Under pipefail, || echo "0" produces double output "0\n0".
    Also: pipe-subshell variable loss and grep|head SIGPIPE.
  affected_scripts:
    - field-export-audit.sh
    - field-cycle.sh
    - field-deposit.sh
  fixed_by: "bb9544c fix(scripts): resolve grep-c, pipe-subshell, and SIGPIPE bugs"
  fixed_date: 2026-03-01

