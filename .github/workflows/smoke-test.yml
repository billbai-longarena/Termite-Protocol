name: Smoke Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify shell syntax
        run: |
          bash -n install.sh templates/scripts/*.sh templates/scripts/hooks/* templates/claude-plugin/scripts/*.sh

      - name: Run install smoke test
        run: |
          set -euo pipefail
          tmp_dir=$(mktemp -d)
          bash install.sh "$tmp_dir"
          (
            cd "$tmp_dir"
            ./scripts/field-arrive.sh
            ./scripts/field-pulse.sh
            sqlite3 .termite.db "select id,status,title from signals;" > signal_rows.txt
            test -f BLACKBOARD.md
            test -f .birth
            grep -q '^S-001|open|' signal_rows.txt
          )
          rm -rf "$tmp_dir"
